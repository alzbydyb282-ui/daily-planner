name: Build Android APK

# Runs automatically on every push to main, OR manually via the
# "Run workflow" button on the GitHub Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (EAS Cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 90          # EAS builds take 15-40 min; 90 is a safe ceiling

    steps:
      # ── 1. Source code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / pnpm toolchain ──────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10            # matches the monorepo's pnpm version

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 3. Install workspace dependencies ─────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. EAS CLI (builds in Expo's cloud, no Android SDK needed) ────
      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}   # ← set this secret in your repo

      # ── 5. Trigger the cloud build and wait for it to finish ──────────
      - name: Build Android APK via EAS
        working-directory: artifacts/daily-planner
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

      # ── 6. Fetch the download URL of the freshly-built APK ───────────
      - name: Get APK download URL
        working-directory: artifacts/daily-planner
        id: get-url
        run: |
          APK_URL=$(eas build:list \
            --platform android \
            --status FINISHED \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null | node -e "
              let data = '';
              process.stdin.on('data', chunk => data += chunk);
              process.stdin.on('end', () => {
                try {
                  const builds = JSON.parse(data);
                  const url = builds[0]?.artifacts?.buildUrl || '';
                  console.log(url);
                } catch (e) { console.log(''); }
              });
            ")
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "✅ APK URL: $APK_URL"

      # ── 7. Download the APK onto the runner ───────────────────────────
      - name: Download APK from EAS
        run: |
          URL="${{ steps.get-url.outputs.apk_url }}"
          if [ -z "$URL" ]; then
            echo "❌ ERROR: APK URL is empty — check the EAS build log above."
            exit 1
          fi
          curl -L --fail --retry 3 -o daily-planner.apk "$URL"
          echo "📦 Downloaded: $(ls -lh daily-planner.apk)"

      # ── 8. Upload as a GitHub Actions artifact (30-day download link) ─
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-planner-android-apk
          path: daily-planner.apk
          retention-days: 30
          if-no-files-found: error
