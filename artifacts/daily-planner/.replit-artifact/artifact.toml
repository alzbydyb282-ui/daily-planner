kind = "mobile"
previewPath = "/"
title = "My Daily Planner"
version = "1.0.0"
id = "artifacts/daily-planner"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20957

[services.development]
run = "pnpm --filter @workspace/daily-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/daily-planner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/daily-planner", "run", "serve" ]

[services.env]
PORT = "20957"
BASE_PATH = "/"
